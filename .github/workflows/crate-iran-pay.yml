name: iran-pay

# Crate-specific checks for `crates/iran-pay`. Only runs when
# this crate (or its workflow file) changes.

on:
  push:
    branches: [main]
    paths:
      - "crates/iran-pay/**"
      - ".github/workflows/crate-iran-pay.yml"
      - "Cargo.toml"
      - "Cargo.lock"
  pull_request:
    paths:
      - "crates/iran-pay/**"
      - ".github/workflows/crate-iran-pay.yml"
      - "Cargo.toml"
      - "Cargo.lock"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  features:
    name: Feature combinations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build -p iran-pay --no-default-features
      - run: cargo build -p iran-pay --no-default-features --features zarinpal,rustls-tls
      - run: cargo build -p iran-pay --no-default-features --features idpay,rustls-tls
      - run: cargo build -p iran-pay --no-default-features --features nextpay,rustls-tls
      - run: cargo build -p iran-pay --no-default-features --features payir,rustls-tls
      - run: cargo build -p iran-pay --no-default-features --features validators,zarinpal,rustls-tls
      - run: cargo build -p iran-pay --no-default-features --features native-tls,zarinpal
      - run: cargo build -p iran-pay --all-features
      - run: cargo test -p iran-pay --all-features

  package:
    name: cargo package (verify publishable)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo package -p iran-pay
