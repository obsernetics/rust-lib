name: Coverage

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  coverage:
    name: cargo-llvm-cov
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      # Exclude pure-data files (`const X: &[(...)] = &[ ... ]` tables) — they
      # contribute thousands of lines that distort the coverage percentage but
      # have no executable behaviour worth measuring.  Excluded:
      #   - parsitext/src/data.rs               (slang + profanity tables)
      #   - parsitext/src/spell_dict.rs         (common-word list)
      #   - parsitext/src/finglish/dict.rs      (Finglish→Persian word map)
      #   - parsitext/src/validators/banks.rs   (Sheba + BIN bank registry)
      - name: Generate LCOV report (all features, excl. data files)
        run: |
          cargo llvm-cov --workspace --all-features --lcov --output-path lcov.info \
            --ignore-filename-regex '(/data\.rs|/banks\.rs|/spell_dict\.rs|/finglish/dict\.rs)$'

      - name: Generate text summary
        run: |
          cargo llvm-cov report --summary-only \
            --ignore-filename-regex '(/data\.rs|/banks\.rs|/spell_dict\.rs|/finglish/dict\.rs)$'

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          fail_ci_if_error: false

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: lcov.info
          path: lcov.info
